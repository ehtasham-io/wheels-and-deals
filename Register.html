<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Here</title>
    <link rel="stylesheet" href="css/Register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"> <!-- Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"> <!-- Google Fonts -->
</head>
<body>
    <header class="banner">
        <div class="logo-container">
            <img class="logo" src="images/logo.png" alt="Company Logo">
            <span class="brand-name">Wheels & Deals</span>
        </div>
        <nav class="nav-links">
            <a href="home.html"><i class="fas fa-home"></i> Home</a>
            <div class="dropdown">
                <button class="dropbtn"><i class="fas fa-car"></i> Inventory<i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="New.html"><i class="fas fa-car-side"></i> New Cars</a>
                    <a href="Used.html"><i class="fas fa-car-alt"></i> Used Cars</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn"><i class="fas fa-cogs"></i> Services <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="maintainance.html"><i class="fas fa-wrench"></i> Maintenance</a>
                    <a href="Spare.html"><i class="fas fa-cogs"></i> Spare Parts</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn"><i class="fas fa-dollar-sign"></i> Finance <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="booking.html"><i class="fas fa-calendar-check"></i> Booking</a>
                    <a href="sell.html"><i class="fas fa-hand-holding-usd"></i> Sell</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn"><i class="fas fa-user"></i> Join Now <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a href="register.html"><i class="fas fa-user-plus"></i> Register</a>
                </div>
            </div>
        </nav>
    </header>
    
    <br>
    <div class="registration-container">
        <h1><i class="fas fa-user-plus"></i> Register</h1>
        <hr>
        <br>
        <form action="home.html" method="get">
            <div class="form-group">
                <label for="username"><i class="fa fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="full-name"><i class="fas fa-id-card"></i> Full Name</label>
                <input type="text" id="full-name" name="full-name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="phone-number"><i class="fas fa-phone"></i> Phone Number</label>
                <input type="text" id="phone-number" name="phone-number" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" pattern=".{8,}" title="Eight or more characters" required>
            </div>
            <div class="form-group">
                <label for="confirm-password"><i class="fas fa-lock"></i> Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" pattern=".{8,}" title="Eight or more characters" required>
            </div>
            <div class="form-group">
                <input type="submit" value="Register">
            </div>
        </form>
        <p class="login">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Wheels&Deals.PK, All Rights Reserved.</p>
    </footer>
</body>
</html>
